name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    if: github.repository_owner == 'Saba-Burduli'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag and branch
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [[ "$GITHUB_REF_NAME" == "v$version" && "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tags must point to a commit on main" >&2
            exit 1
          }

      - name: Detect signing credentials
        id: signing
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          complete=true
          for variable in CERTIFICATE_P12_BASE64 CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD APPLE_KEY_ID APPLE_ISSUER_ID APPLE_API_PRIVATE_KEY APPLE_TEAM_ID; do
            [[ -n "${!variable}" ]] || complete=false
          done
          echo "available=$complete" >> "$GITHUB_OUTPUT"
          if [[ "$complete" != true ]]; then
            echo "::warning::Apple credentials are unavailable; publishing an unsigned, non-notarized DMG."
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.available == 'true'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/release.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/release.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/release.keychain-db"
          security import "$RUNNER_TEMP/certificate.p12" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$RUNNER_TEMP/release.keychain-db"
          security list-keychains -d user -s "$RUNNER_TEMP/release.keychain-db" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/release.keychain-db"

      - name: Build and package DMG
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [[ "${{ steps.signing.outputs.available }}" == true ]]; then
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/AuthKey_${APPLE_KEY_ID}.p8"
            export APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_KEY_ID}.p8"
            export DEVELOPER_ID_APPLICATION="$(security find-identity -v -p codesigning "$RUNNER_TEMP/release.keychain-db" | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)"
            [[ -n "$DEVELOPER_ID_APPLICATION" ]] || { echo "Developer ID Application identity not found in imported certificate" >&2; exit 1; }
          fi
          ./script/package_release.sh "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "dist/KeyForge-${GITHUB_REF_NAME#v}.dmg" \
            --title "KeyForge ${GITHUB_REF_NAME#v}" \
            --notes "Download the DMG and drag KeyForge to Applications. This build may be unsigned; if macOS blocks the first launch, Control-click KeyForge, choose Open, then confirm Open." \
            --verify-tag
